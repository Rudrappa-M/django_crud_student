services:
  - type: web
    name: django-crud-app
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: django-crud-db
          property: connectionString

databases:
  - name: django-crud-db
    plan: free
    databaseName: django_crud
    user: django_crud
